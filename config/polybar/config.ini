[colors]

background = #1E1E2E
background-alt = #313244
foreground = #CDD6F4
primary = #CBA6F7
secondary = #89B4FA
alert = #F38BA8
disabled = #6C7086


[bar/mybar]

width = 100%
offset-x = 0%
offset-y = 0.4%
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 0
padding-right = 2
module-margin = 0


separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:style=Regular:size=12;3"
font-1 = "JetBrainsMono Nerd Font:style=Bold:size=12;3"

modules-left = xworkspaces xwindow
modules-right = battery pulseaudio memory cpu wlan eth date systray 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

icon-0 = 1;ůįĖü
icon-1 = 2;Óěē
icon-2 = 3;ůįąĻ
icon-3 = 4;ůįďá
icon-4 = 5;ůįäī

icon-default = ÔĄĎ

label-active = %icon%
label-active-foreground = #7aa2f7
label-active-background = #3b4261
label-active-underline = #00d7ff
label-active-padding = 2

label-occupied = %icon%
label-occupied-foreground = #c0caf5
label-occupied-padding = 2

label-urgent = %icon%
label-urgent-foreground = #f7768e
label-urgent-background = #3b4261
label-urgent-padding = 2

label-empty = %icon%
label-empty-foreground = #565f89
label-empty-padding = 2

enable-click = true
enable-scroll = true

[module/xwindow]
type = internal/xwindow
label = ¬Ľ %title:0:40:...%
label-foreground = ${colors.primary}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]

type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix = "ÔÄ® "
format-volume-prefix-foreground = ${colors.primary}
label-volume = %percentage%%

label-muted = "ůįłą muted"
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}


[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.primary}


[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/date]
type = internal/date
interval = 1

date = ůĪĎČ %H:%M
date-alt = ÔĀ≥¬≠ %Y-%m-%d

label = %date%
label-foreground = ${colors.primary}

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#A6E3A1}Ôáę %{F-}
label-disconnected = %{F#F38BA8}ůį§ģ %{F-}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#A6E3A1}ůįÄā {F-}
label-disconnected = 
;  %{F#F38BA8}ůĪėĖ %{F-}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
[module/battery]

type = internal/battery

full-at = 100

low-at = 5
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = Fully charged
label-low = BATTERY LOW

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

bar-capacity-width = 10

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ

animation-charging-framerate = 750

; Only applies if <animation-discharging> is used
animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ
; Framerate in milliseconds
animation-discharging-framerate = 500

; Only applies if <animation-low> is used
; New in version 3.6.0
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200 

battery = BAT1
adapter = ACAD

poll-interval = 5